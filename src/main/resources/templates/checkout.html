<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SatPall Crochet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="fas fa-heart" style="color: #d8a5a5;"></i> SatPall Crochet
            </a>
        </div>
    </nav>

    <div class="container-fluid py-4 bg-light">
        <div class="container">
            <h1>Checkout</h1>
        </div>
    </div>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-light border-0 py-3">
                        <h5 class="mb-0 fw-bold">Customer Information</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/checkout/process}" method="post" id="checkoutForm">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">First Name *</label>
                                    <input type="text" name="firstName" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Last Name *</label>
                                    <input type="text" name="lastName" class="form-control" required>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Email *</label>
                                    <input type="email" name="email" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Phone *</label>
                                    <input type="tel" name="phone" class="form-control" required>
                                </div>
                            </div>

                            <h5 class="fw-bold mt-4 mb-3">Shipping Address</h5>
                            <div class="mb-3">
                                <label class="form-label">Address *</label>
                                <input type="text" name="address" class="form-control" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">City *</label>
                                    <input type="text" name="city" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Postal Code *</label>
                                    <input type="text" name="postalCode" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">State</label>
                                <input type="text" name="state" class="form-control">
                            </div>

                            <h5 class="fw-bold mt-4 mb-3">Payment Method</h5>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="cod" value="CASH_ON_DELIVERY" checked>
                                <label class="form-check-label" for="cod">
                                    Cash on Delivery
                                </label>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="card" value="CREDIT_CARD">
                                <label class="form-check-label" for="card">
                                    Credit/Debit Card
                                </label>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="paymentMethod" id="upi" value="UPI">
                                <label class="form-check-label" for="upi">
                                    UPI
                                </label>
                            </div>

                            <h5 class="fw-bold mt-4 mb-3">Order Notes</h5>
                            <div class="mb-3">
                                <textarea name="notes" rows="3" class="form-control" placeholder="Add special instructions or notes..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-custom btn-lg w-100">
                                <i class="fas fa-credit-card"></i> Place Order
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm sticky-top">
                    <div class="card-header bg-light border-0 py-3">
                        <h5 class="mb-0 fw-bold">Order Summary</h5>
                    </div>
                    <div class="card-body">
                        <div class="order-items mb-4" style="max-height: 300px; overflow-y: auto;">
                            <div th:each="item : ${cartItems}" class="d-flex justify-content-between mb-3 pb-3 border-bottom">
                                <div>
                                    <h6 class="mb-1" th:text="${item.productName}"></h6>
                                    <small class="text-muted" th:text="'Qty: ' + ${item.quantity}"></small>
                                </div>
                                <span class="fw-bold" th:text="'₹' + ${item.totalPrice}"></span>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span>Subtotal:</span>
                            <span th:text="'₹' + ${subtotal}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Tax (10%):</span>
                            <span th:text="'₹' + ${tax}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Shipping:</span>
                            <span th:text="'₹' + ${shipping}"></span>
                        </div>
                        
                        <hr>
                        
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold">Grand Total:</span>
                            <span class="fw-bold h5" th:text="'₹' + ${grandTotal}" style="color: #d8a5a5;"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container">
            <p class="text-center mb-0">© 2024 SatPall Crochet. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
