<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SatPall Crochet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                <i class="fas fa-heart" style="color: #d8a5a5;"></i> SatPall Crochet
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/shop}">Shop</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/contact}">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-5 bg-light">
        <div class="container text-center">
            <h1 class="display-4 fw-bold mb-3">Get in Touch</h1>
            <p class="lead text-muted">We'd love to hear from you</p>
        </div>
    </div>

    <div class="container py-5">
        <div class="row mb-5">
            <div class="col-md-4 text-center mb-4">
                <i class="fas fa-envelope fa-3x mb-3" style="color: #d8a5a5;"></i>
                <h5 class="fw-bold">Email</h5>
                <p class="text-muted">info@satpallcrochet.com</p>
            </div>
            <div class="col-md-4 text-center mb-4">
                <i class="fas fa-phone fa-3x mb-3" style="color: #d8a5a5;"></i>
                <h5 class="fw-bold">Phone</h5>
                <p class="text-muted">+91 XXXXX XXXXX</p>
            </div>
            <div class="col-md-4 text-center mb-4">
                <i class="fas fa-map-marker-alt fa-3x mb-3" style="color: #d8a5a5;"></i>
                <h5 class="fw-bold">Location</h5>
                <p class="text-muted">India</p>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h4 class="fw-bold mb-4">Send us a Message</h4>
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Subject</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Message</label>
                                <textarea rows="5" class="form-control" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-custom w-100">
                                <i class="fas fa-paper-plane"></i> Send Message
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container">
            <p class="text-center mb-0">© 2024 SatPall Crochet. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
