<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="d-flex" style="min-height: 100vh;">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark flex-column" style="width: 250px; position: fixed; height: 100vh;">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
                    <i class="fas fa-heart" style="color: #d8a5a5;"></i> SatPall
                </a>
                <div class="collapse navbar-collapse" id="sidebarNav">
                    <ul class="navbar-nav flex-column mt-3">
                        <li class="nav-item mb-3">
                            <a class="nav-link" th:href="@{/admin/dashboard}">
                                <i class="fas fa-chart-line me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item mb-3">
                            <a class="nav-link" th:href="@{/admin/products}">
                                <i class="fas fa-box me-2"></i> Products
                            </a>
                        </li>
                        <li class="nav-item mb-3">
                            <a class="nav-link active" th:href="@{/admin/orders}">
                                <i class="fas fa-shopping-cart me-2"></i> Orders
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div style="margin-left: 250px; width: calc(100% - 250px);">
            <div class="container-fluid py-5">
                <h1 class="fw-bold mb-4">Orders</h1>

                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Order #</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Payment</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="order : ${orders}">
                                    <td th:text="${order.orderNumber}"></td>
                                    <td th:text="'₹' + ${order.grandTotal}"></td>
                                    <td>
                                        <span class="badge" th:classappend="${order.status == 'PENDING' ? 'bg-warning' : order.status == 'PROCESSING' ? 'bg-info' : order.status == 'SHIPPED' ? 'bg-primary' : 'bg-success'}" th:text="${order.status}"></span>
                                    </td>
                                    <td th:text="${order.paymentMethod}"></td>
                                    <td th:text="${order.createdAt}"></td>
                                    <td>
                                        <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
