<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Edit Category' : 'Add Category'} + ' - Admin'">Category Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="d-flex" style="min-height: 100vh;">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark flex-column" style="width: 250px; position: fixed; height: 100vh;">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
                    <i class="fas fa-heart" style="color: #d8a5a5;"></i> SatPall
                </a>
                <div class="collapse navbar-collapse" id="sidebarNav">
                    <ul class="navbar-nav flex-column mt-3">
                        <li class="nav-item mb-3">
                            <a class="nav-link" th:href="@{/admin/dashboard}">
                                <i class="fas fa-chart-line me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item mb-3">
                            <a class="nav-link active" th:href="@{/admin/categories}">
                                <i class="fas fa-list me-2"></i> Categories
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div style="margin-left: 250px; width: calc(100% - 250px);">
            <div class="container-fluid py-5">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-light border-0 py-3">
                                <h4 class="mb-0 fw-bold" th:text="${isEdit ? 'Edit Category' : 'Add New Category'}"></h4>
                            </div>
                            <div class="card-body">
                                <form th:action="${isEdit ? @{/admin/categories/{id}/update(id=${categoryDto.id})} : @{/admin/categories/create}}" 
                                      method="post" enctype="multipart/form-data">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Category Name *</label>
                                        <input type="text" name="name" th:value="${categoryDto.name}" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Description</label>
                                        <textarea name="description" rows="4" class="form-control" th:text="${categoryDto.description}"></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Category Image</label>
                                        <input type="file" name="file" class="form-control" accept="image/*">
                                    </div>
                                    <div class="mb-3">
                                        <div class="form-check">
                                            <input type="checkbox" name="isActive" id="isActive" class="form-check-input" th:checked="${categoryDto.isActive}">
                                            <label class="form-check-label" for="isActive">
                                                Active
                                            </label>
                                        </div>
                                    </div>
                                    <div class="d-grid gap-2 d-sm-flex">
                                        <button type="submit" class="btn btn-custom">
                                            <i class="fas fa-save me-2"></i> Save Category
                                        </button>
                                        <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">
                                            <i class="fas fa-times me-2"></i> Cancel
                                        </a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
