<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="d-flex" style="min-height: 100vh;">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark flex-column" style="width: 250px; position: fixed; height: 100vh;">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}">
                    <i class="fas fa-heart" style="color: #d8a5a5;"></i> SatPall
                </a>
                <div class="collapse navbar-collapse" id="sidebarNav">
                    <ul class="navbar-nav flex-column mt-3">
                        <li class="nav-item mb-3">
                            <a class="nav-link" th:href="@{/admin/dashboard}">
                                <i class="fas fa-chart-line me-2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item mb-3">
                            <a class="nav-link" th:href="@{/admin/products}">
                                <i class="fas fa-box me-2"></i> Products
                            </a>
                        </li>
                        <li class="nav-item mb-3">
                            <a class="nav-link active" th:href="@{/admin/categories}">
                                <i class="fas fa-list me-2"></i> Categories
                            </a>
                        </li>
                        <li class="nav-item mb-3">
                            <a class="nav-link" th:href="@{/admin/orders}">
                                <i class="fas fa-shopping-cart me-2"></i> Orders
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div style="margin-left: 250px; width: calc(100% - 250px);">
            <div class="container-fluid py-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="fw-bold">Categories</h1>
                    <a th:href="@{/admin/categories/create}" class="btn btn-custom">
                        <i class="fas fa-plus me-2"></i> Add Category
                    </a>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Description</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="category : ${categories}">
                                    <td th:text="${category.name}"></td>
                                    <td th:text="${category.description}"></td>
                                    <td>
                                        <span th:if="${category.isActive}" class="badge bg-success">Active</span>
                                        <span th:if="!${category.isActive}" class="badge bg-danger">Inactive</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/admin/categories/{id}/edit(id=${category.id})}" class="btn btn-sm btn-outline-primary">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post" style="display: inline;" onsubmit="return confirm('Are you sure?');">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
